<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life in the UK — Revision</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f1f3d;--royal:#1a3a6e;--gold:#c9a84c;--gold-light:#e8c97a;
  --cream:#faf6ee;--parchment:#f0e8d5;--text:#1a1a2e;
  --c-monarch:#4a9edd;--c-war:#e05c5c;--c-reform:#4cbe8a;
  --c-event:#c9a84c;--c-law:#8fa3b0;
  --c-science:#a78bfa;--c-sport:#f97316;--c-art:#ec4899;--c-politics:#34d399;
}
html{scroll-behavior:smooth}
body{
  font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--cream);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:24px 16px 80px;position:relative;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 15% 0%,rgba(201,168,76,0.07) 0%,transparent 55%),
             radial-gradient(ellipse at 85% 100%,rgba(26,58,110,0.5) 0%,transparent 55%);
}
body::after{
  content:'🇬🇧';position:fixed;bottom:-30px;right:-30px;
  font-size:260px;opacity:0.03;pointer-events:none;z-index:0;
}

/* ── HEADER ── */
header{text-align:center;margin-bottom:28px;position:relative;z-index:1}
.crown{font-size:34px;display:block;margin-bottom:6px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
h1{font-family:'Playfair Display',serif;font-size:clamp(1.5rem,4vw,2.2rem);color:var(--gold);letter-spacing:0.5px;line-height:1.2}
h1 em{font-style:italic;color:var(--cream)}
.subtitle{margin-top:5px;font-size:0.78rem;color:rgba(250,246,238,0.45);letter-spacing:2.5px;text-transform:uppercase}

/* ── MODE TABS ── */
.mode-tabs{
  display:flex;gap:3px;background:rgba(0,0,0,0.25);border-radius:12px;padding:4px;
  margin-bottom:24px;position:relative;z-index:1;border:1px solid rgba(201,168,76,0.12);
  flex-wrap:wrap;justify-content:center;
}
.mode-tab{
  padding:7px 16px;border-radius:9px;border:none;background:transparent;
  color:rgba(250,246,238,0.5);font-family:'DM Sans',sans-serif;font-size:0.78rem;
  cursor:pointer;transition:all 0.2s;letter-spacing:0.3px;white-space:nowrap;
}
.mode-tab:hover{color:var(--cream)}
.mode-tab.active{background:var(--gold);color:var(--navy);font-weight:600}

/* ── CATEGORY TABS ── */
.tabs{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;max-width:720px;width:100%;margin-bottom:24px;position:relative;z-index:1}
.tab{padding:5px 13px;border-radius:20px;border:1px solid rgba(201,168,76,0.28);background:transparent;color:rgba(250,246,238,0.58);font-family:'DM Sans',sans-serif;font-size:0.75rem;cursor:pointer;transition:all 0.18s;letter-spacing:0.4px}
.tab:hover{border-color:var(--gold);color:var(--gold)}
.tab.active{background:var(--gold);color:var(--navy);border-color:var(--gold);font-weight:500}

/* ── PROGRESS ── */
.progress-bar{width:100%;max-width:520px;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;margin-bottom:9px;position:relative;z-index:1}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:2px;transition:width 0.4s ease}
.progress-text{font-size:0.72rem;color:rgba(250,246,238,0.4);text-align:center;margin-bottom:22px;letter-spacing:0.8px;position:relative;z-index:1}

/* ── MULTIPLE CHOICE CARD ── */
.mc-card{
  width:100%;max-width:620px;background:linear-gradient(135deg,#1e3461,#142448);
  border:1px solid rgba(201,168,76,0.22);border-radius:18px;
  padding:28px 30px 24px;position:relative;z-index:1;margin-bottom:22px;
  box-shadow:0 18px 50px rgba(0,0,0,0.45),inset 0 1px 0 rgba(201,168,76,0.1);
}
.mc-card::before{content:'';position:absolute;top:11px;left:11px;right:11px;bottom:11px;border:1px solid rgba(201,168,76,0.07);border-radius:10px;pointer-events:none}
.mc-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.mc-category{font-size:0.62rem;letter-spacing:1.8px;text-transform:uppercase;color:var(--gold);opacity:0.8;font-weight:600}
.mc-counter{font-size:0.62rem;letter-spacing:1px;color:rgba(250,246,238,0.3);text-transform:uppercase}
.mc-question{font-family:'Playfair Display',serif;font-size:clamp(0.97rem,2.6vw,1.18rem);color:var(--cream);line-height:1.55;margin-bottom:22px}
.mc-options{display:flex;flex-direction:column;gap:9px}
.mc-opt{
  display:flex;align-items:flex-start;gap:11px;padding:11px 14px;border-radius:10px;
  border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);
  cursor:pointer;transition:all 0.17s;text-align:left;
  font-family:'DM Sans',sans-serif;font-size:0.82rem;color:var(--cream);line-height:1.45;
}
.mc-opt:hover:not(.disabled){background:rgba(201,168,76,0.09);border-color:rgba(201,168,76,0.35)}
.mc-opt.correct{background:rgba(30,126,82,0.18)!important;border-color:#4ecb8d!important;color:#a3f0c8}
.mc-opt.wrong{background:rgba(192,57,43,0.15)!important;border-color:#e07c6e!important;color:#f0a89e}
.mc-opt.disabled{cursor:default}
.mc-opt-letter{
  width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);
  display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:700;
  flex-shrink:0;color:rgba(250,246,238,0.5);letter-spacing:0;margin-top:1px;transition:all 0.17s;
}
.mc-opt.correct .mc-opt-letter{background:rgba(30,126,82,0.4);border-color:#4ecb8d;color:#4ecb8d}
.mc-opt.wrong .mc-opt-letter{background:rgba(192,57,43,0.3);border-color:#e07c6e;color:#e07c6e}
.mc-hint{font-size:0.71rem;color:rgba(201,168,76,0.6);font-style:italic;margin-top:14px;min-height:1em;opacity:0;transition:opacity 0.3s;padding-left:2px}
.mc-hint.visible{opacity:1}

/* ── CONTROLS ── */
.controls{display:flex;gap:10px;align-items:center;position:relative;z-index:1;margin-bottom:18px}
.btn{display:flex;align-items:center;gap:5px;padding:9px 20px;border-radius:8px;border:none;font-family:'DM Sans',sans-serif;font-size:0.8rem;font-weight:500;cursor:pointer;transition:all 0.18s;letter-spacing:0.4px}
.btn-nav{background:rgba(255,255,255,0.06);color:var(--cream);border:1px solid rgba(255,255,255,0.1)}
.btn-nav:hover{background:rgba(255,255,255,0.11);border-color:rgba(255,255,255,0.22)}
.btn-shuffle{background:transparent;color:var(--gold);border:1px solid rgba(201,168,76,0.32);padding:9px 14px}
.btn-shuffle:hover{background:rgba(201,168,76,0.09)}
.dots{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;max-width:620px;position:relative;z-index:1}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.11);transition:background 0.25s;cursor:pointer}
.dot.known{background:#4ecb8d}.dot.unsure{background:#e07c6e}.dot.current{background:var(--gold);box-shadow:0 0 5px var(--gold)}

/* ═══════════════════════════════════════════
   FAMILY TREE  — dynasties side by side
═══════════════════════════════════════════ */

/* Outer monarchs wrapper */
#monarchsView{ position:relative; }

/* Legend bar */
#ftLegend{
  display:flex;flex-wrap:wrap;gap:8px 18px;justify-content:center;
  margin-bottom:16px;padding:9px 14px;
  background:rgba(0,0,0,0.2);border-radius:10px;
  border:1px solid rgba(255,255,255,0.06);
}

/* Main area: tree + side timeline */
#ftMain{ display:flex; gap:0; align-items:flex-start; width:100%; }

/* Horizontally scrollable tree */
#ftTreeWrap{
  flex:1;min-width:0;
  overflow-x:auto;overflow-y:visible;
  padding-bottom:16px;
  scrollbar-width:thin;scrollbar-color:rgba(201,168,76,0.25) transparent;
}

/* Row of dynasty columns */
#ftDynastyRow{
  display:inline-flex;gap:0;align-items:flex-start;
  min-width:max-content;padding:4px 2px 8px;
}

/* Arrow connectors between dynasties */
.ft-arrow{
  display:flex;align-items:flex-start;padding-top:48px;
  width:28px;flex-shrink:0;justify-content:center;
}
.ft-arrow-inner{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  font-size:0.55rem;color:rgba(201,168,76,0.4);letter-spacing:0.5px;
  text-align:center;line-height:1.2;
}
.ft-arrow-line{
  width:1px;height:18px;background:rgba(201,168,76,0.25);
  margin:2px 0;
}
.ft-arrow-head{ font-size:0.65rem; color:rgba(201,168,76,0.45); }

/* Single dynasty column */
.ft-dynasty{
  flex-shrink:0;border-radius:12px;
  border:1px solid rgba(255,255,255,0.07);
  background:rgba(0,0,0,0.18);
  overflow:hidden;
}

/* Coloured dynasty header */
.ft-dynasty-header{
  padding:7px 12px 6px;text-align:center;
  font-size:0.58rem;letter-spacing:2px;text-transform:uppercase;font-weight:600;
  border-bottom:1px solid rgba(255,255,255,0.07);
}

/* Node area with relative positioning for SVG */
.ft-dynasty-body{
  position:relative;padding:10px 10px 12px;
  display:flex;flex-direction:column;gap:8px;
}

/* SVG layer over the body */
.ft-dynasty-svg{
  position:absolute;inset:0;pointer-events:none;overflow:visible;z-index:0;
}

/* Generation row */
.ft-row{
  display:flex;gap:8px;justify-content:center;
  position:relative;z-index:1;
}

/* Monarch node card */
.ft-node{
  width:112px;flex-shrink:0;border-radius:9px;padding:8px 10px;
  border:1px solid rgba(255,255,255,0.1);cursor:pointer;
  position:relative;transition:border-color 0.15s,box-shadow 0.15s,transform 0.15s;
  background:rgba(255,255,255,0.04);
}
.ft-node:hover{ transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,0.5); }
.ft-node.reigned{ border-left-width:3px; }
.ft-node.active{
  box-shadow:0 0 0 2px var(--gold),0 6px 22px rgba(0,0,0,0.55)!important;
  border-color:var(--gold)!important;
}
.ft-node-crown{ font-size:0.82rem;display:block;margin-bottom:2px;line-height:1; }
.ft-node-name{
  font-family:'Playfair Display',serif;
  font-size:0.69rem;line-height:1.28;margin-bottom:2px;
}
.ft-node-reign{ font-size:0.56rem;opacity:0.5;letter-spacing:0.3px; }
.ft-node-note{ font-size:0.52rem;opacity:0.35;font-style:italic;margin-top:3px;line-height:1.25; }

/* ── Side timeline ── */
#ftTimeline{
  width:190px;flex-shrink:0;
  padding-left:14px;border-left:1px solid rgba(201,168,76,0.16);
  margin-left:12px;max-height:78vh;overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:rgba(201,168,76,0.25) transparent;
}
.ft-tl-head{
  font-size:0.58rem;letter-spacing:2px;text-transform:uppercase;
  color:rgba(201,168,76,0.5);margin-bottom:10px;text-align:center;
}
.ft-tl-item{
  display:flex;align-items:flex-start;gap:7px;margin-bottom:6px;
  cursor:pointer;padding:5px 7px;border-radius:7px;
  transition:background 0.14s;border:1px solid transparent;
}
.ft-tl-item:hover{ background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.08); }
.ft-tl-item.active{ background:rgba(201,168,76,0.08);border-color:rgba(201,168,76,0.28); }
.ft-tl-bar{ width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:32px; }
.ft-tl-name{ font-family:'Playfair Display',serif;font-size:0.68rem;line-height:1.22;margin-bottom:1px; }
.ft-tl-reign{ font-size:0.57rem;opacity:0.4;letter-spacing:0.3px; }

/* ── POPUP MODAL ── */
#ftPopupOverlay{
  display:none;position:fixed;inset:0;z-index:9999;
  background:rgba(4,10,24,0.8);backdrop-filter:blur(5px);
  align-items:center;justify-content:center;padding:20px;
}
#ftPopupOverlay.open{ display:flex; }
#ftPopup{
  position:relative;max-width:460px;width:100%;
  border-radius:18px;padding:26px 26px 22px;
  border:1px solid rgba(255,255,255,0.12);
  box-shadow:0 32px 80px rgba(0,0,0,0.75),0 0 0 1px rgba(255,255,255,0.04);
  background:linear-gradient(150deg,#16233f 0%,#0c1628 100%);
  animation:popIn 0.2s cubic-bezier(0.34,1.5,0.64,1);
  max-height:90vh;overflow-y:auto;
}
@keyframes popIn{
  from{ transform:scale(0.86) translateY(14px);opacity:0; }
  to{ transform:scale(1) translateY(0);opacity:1; }
}
#ftPopupClose{
  position:absolute;top:12px;right:12px;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
  color:rgba(250,246,238,0.5);font-size:0.8rem;
  border-radius:6px;padding:3px 10px;cursor:pointer;
  transition:all 0.15s;font-family:'DM Sans',sans-serif;
}
#ftPopupClose:hover{ background:rgba(255,255,255,0.12);color:var(--cream); }
.ftpop-dynasty-bar{
  height:3px;border-radius:2px;margin-bottom:18px;
  background:linear-gradient(90deg,var(--pop-color,#c9a84c),transparent);
}
.ftpop-top{ display:flex;align-items:flex-start;gap:14px;margin-bottom:14px; }
.ftpop-crown{ font-size:1.9rem;line-height:1;flex-shrink:0;margin-top:3px; }
.ftpop-name{
  font-family:'Playfair Display',serif;
  font-size:1.15rem;line-height:1.25;color:var(--cream);margin-bottom:3px;
}
.ftpop-reign{ font-size:0.7rem;letter-spacing:0.5px;opacity:0.5;margin-bottom:6px; }
.ftpop-pill{
  display:inline-block;font-size:0.57rem;letter-spacing:1.5px;text-transform:uppercase;
  padding:2px 8px;border-radius:8px;border:1px solid;opacity:0.7;
}
.ftpop-note-line{ font-size:0.68rem;font-style:italic;opacity:0.42;margin-top:4px; }
.ftpop-divider{ height:1px;background:rgba(255,255,255,0.08);margin:14px 0; }
.ftpop-facts{
  font-size:0.78rem;line-height:1.8;white-space:pre-line;
  opacity:0.82;margin-bottom:0;
}
.ftpop-succ{
  margin-top:14px;padding-top:12px;
  border-top:1px solid rgba(255,255,255,0.07);
  font-size:0.7rem;font-style:italic;opacity:0.45;line-height:1.55;
}
.ftpop-succ b{ font-style:normal;opacity:0.65;font-weight:500; }

/* ═══════════════════════════════════════════
   HISTORY TIMELINE  — single central spine
═══════════════════════════════════════════ */
#timelineView{
  display:none;width:100%;max-width:860px;
  position:relative;z-index:1;
}

/* Legend */
.tl-legend{
  display:flex;flex-wrap:wrap;gap:10px 18px;justify-content:center;
  margin-bottom:18px;padding:10px 16px;
  background:rgba(0,0,0,0.2);border-radius:10px;
  border:1px solid rgba(255,255,255,0.06);
}
.tl-legend-item{display:flex;align-items:center;gap:5px;font-size:0.68rem;color:rgba(250,246,238,0.55);letter-spacing:0.3px}
.tl-legend-pip{width:9px;height:9px;border-radius:50%;flex-shrink:0}

/* Era filter */
.tl-era-filter{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.era-btn{
  padding:5px 13px;border-radius:14px;border:1px solid rgba(201,168,76,0.22);
  background:transparent;color:rgba(250,246,238,0.5);font-family:'DM Sans',sans-serif;
  font-size:0.72rem;cursor:pointer;transition:all 0.18s;
}
.era-btn:hover{border-color:var(--gold);color:var(--gold)}
.era-btn.active{background:rgba(201,168,76,0.14);border-color:var(--gold);color:var(--gold-light);font-weight:600}

/* ── Spine wrapper ── */
.tl-spine-wrap{
  position:relative;
  padding:0 0 40px;
}

/* The central vertical line */
.tl-spine{
  position:absolute;
  left:50%;transform:translateX(-50%);
  top:0;bottom:0;width:2px;
  background:linear-gradient(to bottom,
    transparent 0%,
    rgba(201,168,76,0.45) 3%,
    rgba(201,168,76,0.45) 97%,
    transparent 100%);
  z-index:0;
}

/* ── EVENT ENTRY ── */
/* Each event row: card on one side, dot+line connecting to spine */
.tl-event-row{
  position:relative;z-index:1;
  display:flex;align-items:flex-start;
  margin-bottom:10px;
  min-height:42px;
}

/* Left-side events: card on left, line extends right to spine */
.tl-event-row.left{
  justify-content:flex-start;
  padding-right:calc(50% + 18px);
}
/* Right-side events: card on right, line extends left to spine */
.tl-event-row.right{
  justify-content:flex-end;
  padding-left:calc(50% + 18px);
}

/* The event card itself */
.tl-event-card{
  border-radius:9px;padding:9px 12px;
  border:1px solid rgba(255,255,255,0.08);
  position:relative;overflow:hidden;
  cursor:pointer;transition:border-color 0.16s,box-shadow 0.16s;
  width:100%;
}
.tl-event-card:hover{
  border-color:rgba(255,255,255,0.2);
  box-shadow:0 3px 16px rgba(0,0,0,0.35);
}
.tl-event-card-bar{
  position:absolute;top:0;bottom:0;width:3px;
}
.tl-event-row.left  .tl-event-card-bar{right:0;border-radius:0 3px 3px 0}
.tl-event-row.right .tl-event-card-bar{left:0;border-radius:3px 0 0 3px}

.tl-event-year{
  font-size:0.62rem;font-weight:600;letter-spacing:0.8px;
  margin-bottom:2px;opacity:0.85;
}
.tl-event-type{
  display:inline-block;font-size:0.55rem;letter-spacing:1px;text-transform:uppercase;
  padding:1px 6px;border-radius:6px;border:1px solid currentColor;
  margin-left:5px;vertical-align:middle;opacity:0.65;
}
.tl-event-title{
  font-family:'Playfair Display',serif;
  font-size:0.84rem;line-height:1.32;margin-bottom:2px;font-weight:700;
}
.tl-event-sub{font-size:0.7rem;opacity:0.52;font-style:italic;margin-bottom:4px}
.tl-event-body{
  font-size:0.73rem;line-height:1.62;
  max-height:0;overflow:hidden;opacity:0;
  transition:max-height 0.35s ease,opacity 0.28s;
}
.tl-event-card.open .tl-event-body{max-height:250px;opacity:0.76}
.tl-event-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.tl-tag{
  font-size:0.57rem;padding:2px 6px;border-radius:5px;
  border:1px solid rgba(255,255,255,0.1);
  color:rgba(250,246,238,0.38);letter-spacing:0.3px;
}

/* Dot on the spine */
.tl-event-dot{
  position:absolute;top:13px;
  width:10px;height:10px;border-radius:50%;
  border:2px solid var(--navy);z-index:2;
  flex-shrink:0;
}
.tl-event-row.left  .tl-event-dot{right:calc(50% - 5px - 18px + 18px);right:calc(50% - 5px)}
.tl-event-row.right .tl-event-dot{left:calc(50% - 5px)}

/* Horizontal connecting line from card to dot */
.tl-event-hline{
  position:absolute;top:17px;height:1px;opacity:0.4;
}
.tl-event-row.left  .tl-event-hline{right:0;width:calc(50% - 14px)}
.tl-event-row.right .tl-event-hline{left:0;width:calc(50% - 14px)}

/* Ruler annotation row — monarch + PM side by side */
.tl-ruler-row{
  display:flex;flex-wrap:wrap;align-items:center;gap:6px 10px;
  margin-top:7px;padding-top:6px;
  border-top:1px solid rgba(255,255,255,0.06);
}
.tl-ruler-note{
  font-size:0.59rem;letter-spacing:0.4px;opacity:0.62;
  font-family:'DM Sans',sans-serif;white-space:nowrap;
}
.tl-ruler-divider{
  width:1px;height:10px;background:rgba(255,255,255,0.15);flex-shrink:0;
}

/* Era section header label */
.tl-era-header{
  position:relative;z-index:2;
  display:flex;align-items:center;justify-content:center;
  padding:14px 0 8px;
}
.tl-era-chip{
  padding:4px 18px;border-radius:16px;border:1px solid;
  font-size:0.62rem;letter-spacing:2px;text-transform:uppercase;
  font-family:'Playfair Display',serif;
  background:var(--navy);/* sits on spine */
}

/* Mobile */
@media(max-width:600px){
  .tl-event-row.left{ padding-right:0; }
  .tl-event-row.right{ padding-left:0; justify-content:flex-start; }

let mode='cards';
let cards=[...ALL_CARDS],currentIndex=0;
let progress=new Array(cards.length).fill(null),activeCategory='All';
let mIndex=0,mFlipped=false,mProgress=new Array(MONARCHS.length).fill(null);
const CARD_CATS=['All',...new Set(ALL_CARDS.map(c=>c.cat))];
let currentEra='all';

/* ═════════ MODE SWITCH ═════════ */
function setMode(m){
  mode=m;
  document.getElementById('cardsView').style.display=m==='cards'?'flex':'none';
  document.getElementById('monarchsView').style.display=m==='monarchs'?'block':'none';
  document.getElementById('timelineView').style.display=m==='timeline'?'block':'none';
  document.getElementById('peopleView').style.display=m==='people'?'block':'none';
  document.getElementById('lawView').style.display=m==='law'?'block':'none';
  document.querySelectorAll('.mode-tab').forEach((t,i)=>t.classList.toggle('active',['cards','monarchs','timeline','people','law'][i]===m));
  if(m==='cards')renderAll();
  if(m==='monarchs')renderFamilyTree();
  if(m==='timeline')renderTimeline('all');
  if(m==='people')renderPeople('all');
  if(m==='law')renderLaw('courts');
}

/* ═════════ FLASHCARDS — MULTIPLE CHOICE ═════════ */
function getFiltered(){return activeCategory==='All'?[...ALL_CARDS]:ALL_CARDS.filter(c=>c.cat===activeCategory)}
function renderTabs(){
  const el=document.getElementById('tabs');el.innerHTML='';
  CARD_CATS.forEach(cat=>{
    const b=document.createElement('button');b.className='tab'+(cat===activeCategory?' active':'');
    b.textContent=cat+(cat!=='All'?' ('+ALL_CARDS.filter(c=>c.cat===cat).length+')':'');
    b.onclick=()=>{activeCategory=cat;cards=getFiltered();progress=new Array(cards.length).fill(null);currentIndex=0;renderAll()};
    el.appendChild(b);
  });
}
function renderCard(){
  const c=cards[currentIndex];
  document.getElementById('mcCategory').textContent=c.cat;
  document.getElementById('mcCounter').textContent=`Q ${currentIndex+1} / ${cards.length}`;
  document.getElementById('mcQuestion').textContent=c.q;
  const hint=document.getElementById('mcHint');
  hint.textContent=c.hint||'';
  hint.classList.remove('visible');

  const optsEl=document.getElementById('mcOptions');
  optsEl.innerHTML='';
  const letters=['A','B','C','D'];
  const answered=progress[currentIndex];

  c.options.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='mc-opt'+(answered!==null?' disabled':'');
    if(answered!==null){
      if(i===c.correct) btn.classList.add('correct');
      else if(i===answered && i!==c.correct) btn.classList.add('wrong');
    }
    btn.innerHTML=`<span class="mc-opt-letter">${letters[i]}</span><span>${opt}</span>`;
    if(answered===null){
      btn.onclick=()=>selectAnswer(i);
    }
    optsEl.appendChild(btn);
  });
}
function selectAnswer(i){
  const c=cards[currentIndex];
  progress[currentIndex]=i;
  renderCard();
  // Show hint after answering
  if(c.hint){
    const hint=document.getElementById('mcHint');
    hint.classList.add('visible');
  }
  // Auto-advance after delay
  setTimeout(()=>{
    if(currentIndex<cards.length-1){currentIndex++;renderAll();}
    else renderDots();
  }, i===c.correct ? 900 : 1600);
}
function renderProgress(){
  const total=cards.length;
  const correct=progress.filter((p,i)=>p===cards[i].correct).length;
  const answered=progress.filter(p=>p!==null).length;
  document.getElementById('progressFill').style.width=`${((currentIndex+1)/total)*100}%`;
  document.getElementById('progressText').textContent=
    answered===0 ? `Question ${currentIndex+1} of ${total}` :
    `Question ${currentIndex+1} of ${total}  ·  ${correct} correct of ${answered} answered`;
}
function renderDots(){
  const el=document.getElementById('dots');el.innerHTML='';
  cards.forEach((_,i)=>{
    const d=document.createElement('div');
    const ans=progress[i];
    const isCorrect=ans===cards[i].correct;
    d.className='dot'+(i===currentIndex?' current':ans===null?'':isCorrect?' known':' unsure');
    d.title=ans===null?'Unanswered':isCorrect?'Correct':'Incorrect';
    d.onclick=()=>{currentIndex=i;progress[i]=null;renderAll()};
    el.appendChild(d);
  });
}
function renderAll(){renderTabs();renderCard();renderProgress();renderDots()}
function nextCard(){if(currentIndex<cards.length-1){currentIndex++;renderAll()}}
function prevCard(){if(currentIndex>0){currentIndex--;renderAll()}}
function shuffleCards(){
  for(let i=cards.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[cards[i],cards[j]]=[cards[j],cards[i]]}
  progress=new Array(cards.length).fill(null);currentIndex=0;renderAll();
}

function nid(id){ return 'ft_'+id.replace(/[^a-zA-Z0-9]/g,'_'); }

// Enrich nodes with MONARCHS data
function enrichNode(node, dynastyColor){
  node.dynastyColor = dynastyColor;
  const m = MONARCHS.find(m=>m.name===node.id);
  if(m){
    node.reign = m.reign; node.house = m.house; node.houseColor = m.houseColor;
    if(!node.facts) node.facts = m.facts;
    if(!node.succession) node.succession = m.succession;
  } else {
    node.reign = node.reign||''; node.house = node.house||'';
    node.houseColor = dynastyColor;
  }
}
FT_DYNASTIES.forEach(d => d.rows.forEach(row => row.forEach(n => enrichNode(n, d.color))));

const FT_ALL = FT_DYNASTIES.flatMap(d => d.rows.flat());
const FT_REIGNED = FT_ALL.filter(n => n.reigned);
let ftActiveId = null;

/* ── render everything ── */
function renderFamilyTree(){
  renderFTLegend();
  renderFTDynasties();

}

function renderFTLegend(){
  const el = document.getElementById('ftLegend');
  el.innerHTML = FT_DYNASTIES.map(d=>
    `<div style="display:flex;align-items:center;gap:5px;font-size:0.67rem;color:rgba(250,246,238,0.62)">
      <div style="width:9px;height:9px;border-radius:2px;background:${d.color};flex-shrink:0"></div>${d.label}
    </div>`
  ).join('');
}

function renderFTDynasties(){
  const row = document.getElementById('ftDynastyRow');
  row.innerHTML = '';

  FT_DYNASTIES.forEach((dynasty, di) => {
    // Arrow between dynasties
    if(di > 0){
      const arrow = document.createElement('div');
      arrow.className = 'ft-arrow';
      // Find which node links INTO this dynasty (has succParent)
      const entryNode = dynasty.rows[0][0];
      const label = entryNode.succParent ? entryNode.succParent.split(' ').slice(0,2).join(' ') : '';
      arrow.innerHTML = `<div class="ft-arrow-inner">
        <div class="ft-arrow-line"></div>
        <div class="ft-arrow-head">→</div>
      </div>`;
      row.appendChild(arrow);
    }

    // Dynasty column
    const col = document.createElement('div');
    col.className = 'ft-dynasty';

    // Header
    const hdr = document.createElement('div');
    hdr.className = 'ft-dynasty-header';
    hdr.style.cssText = `background:${dynasty.color}18;color:${dynasty.color};`;
    hdr.textContent = dynasty.label;
    col.appendChild(hdr);

    // Body — rows of nodes
    const body = document.createElement('div');
    body.className = 'ft-dynasty-body';

    // SVG layer for connectors within dynasty
    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('class','ft-dynasty-svg');
    svg.setAttribute('width','100%');
    svg.setAttribute('height','100%');
    body.appendChild(svg);

    // Keep track of node elements for connector drawing
    const nodeEls = {};

    dynasty.rows.forEach(rowData => {
      const rowEl = document.createElement('div');
      rowEl.className = 'ft-row';
      rowData.forEach(node => {
        const nd = document.createElement('div');
        nd.className = 'ft-node' + (node.reigned ? ' reigned' : '');
        nd.id = nid(node.id);
        nd.style.cssText = `border-color:${dynasty.color}35;`
          + (node.reigned ? `border-left-color:${dynasty.color};border-left-width:3px;` : '');
        nd.innerHTML = `
          <span class="ft-node-crown">${node.crown||'♛'}</span>
          <div class="ft-node-name">${node.id}</div>
          ${node.reign ? `<div class="ft-node-reign">${node.reign}</div>` : ''}
          ${node.note ? `<div class="ft-node-note">${node.note}</div>` : ''}`;
        nd.addEventListener('click', () => openFTPopup(node, nd));
        nodeEls[node.id] = nd;
        rowEl.appendChild(nd);
      });
      body.appendChild(rowEl);
    });

    col.appendChild(body);
    row.appendChild(col);

    // Draw SVG connectors inside this dynasty after layout
    requestAnimationFrame(() => {
      const bodyRect = body.getBoundingClientRect();
      svg.setAttribute('width', body.offsetWidth);
      svg.setAttribute('height', body.offsetHeight);

      dynasty.rows.forEach(rowData => {
        rowData.forEach(node => {
          if(!node.parent) return;
          // Only draw within-dynasty connections (not succParent cross-dynasty links)
          if(node.succParent) return;
          const childEl = nodeEls[node.id];
          const parentEl = nodeEls[node.parent];
          if(!childEl || !parentEl) return;

          const cR = childEl.getBoundingClientRect();
          const pR = parentEl.getBoundingClientRect();
          const px = pR.left - bodyRect.left + pR.width/2;
          const py = pR.top  - bodyRect.top  + pR.height;
          const cx = cR.left - bodyRect.left + cR.width/2;
          const cy = cR.top  - bodyRect.top;
          const midY = (py + cy) / 2;

          const path = document.createElementNS('http://www.w3.org/2000/svg','path');
          path.setAttribute('d', `M ${px} ${py} C ${px} ${midY}, ${cx} ${midY}, ${cx} ${cy}`);
          path.setAttribute('fill','none');
          path.setAttribute('stroke', dynasty.color+'70');
          path.setAttribute('stroke-width','1.5');
          svg.appendChild(path);
        });
      });
    });
  });
}

/* ── Popup ── */
function openFTPopup(node, nodeEl){
  // Highlight node + timeline item
  document.querySelectorAll('.ft-node.active').forEach(n=>n.classList.remove('active'));
  document.querySelectorAll('.ft-tl-item.active').forEach(n=>n.classList.remove('active'));
  if(nodeEl) nodeEl.classList.add('active');
  ftActiveId = node.id;
  const tlItem = document.getElementById('fttl_'+nid(node.id));
  if(tlItem){ tlItem.classList.add('active'); tlItem.scrollIntoView({behavior:'smooth',block:'nearest'}); }

  const c = node.dynastyColor;
  const popup = document.getElementById('ftPopup');
  popup.style.setProperty('--pop-color', c);
  popup.style.borderColor = c+'40';

  document.getElementById('ftPopupContent').innerHTML = `
    <div class="ftpop-dynasty-bar" style="background:linear-gradient(90deg,${c},transparent)"></div>
    <div class="ftpop-top">
      <span class="ftpop-crown">${node.crown||'♛'}</span>
      <div>
        <div class="ftpop-name">${node.id}</div>
        <div class="ftpop-reign">${node.reign||'dates unknown'}</div>
        <span class="ftpop-pill" style="border-color:${c};color:${c}">House of ${node.house||node.dynastyColor}</span>
        ${node.note ? `<div class="ftpop-note-line">${node.note}</div>` : ''}
      </div>
    </div>
    <div class="ftpop-divider"></div>
    ${node.facts
      ? `<div class="ftpop-facts">${node.facts}</div>`
      : `<div style="opacity:0.38;font-size:0.78rem;font-style:italic">No detailed records held.</div>`}
    ${node.succession
      ? `<div class="ftpop-succ"><b>Succession:</b> ${node.succession}</div>`
      : ''}`;

  document.getElementById('ftPopupOverlay').classList.add('open');
}

function closeFTPopup(){
  document.getElementById('ftPopupOverlay').classList.remove('open');
  document.querySelectorAll('.ft-node.active').forEach(n=>n.classList.remove('active'));
  document.querySelectorAll('.ft-tl-item.active').forEach(n=>n.classList.remove('active'));
  ftActiveId = null;
}

// Close popup on Escape
document.addEventListener('keydown', e => { if(e.key==='Escape') closeFTPopup(); });

// Resolve CSS variable colours to hex strings for inline use
const COLOR_MAP={
  'var(--c-war)':'#e05c5c',
  'var(--c-reform)':'#4cbe8a',
  'var(--c-event)':'#c9a84c',
  'var(--c-law)':'#8fa3b0',
  'var(--c-monarch)':'#4a9edd',
};
function resolveColor(c){ return COLOR_MAP[c]||c; }

function renderTimeline(era){
  const container=document.getElementById('tlContent');
  container.innerHTML='';

  const eras=era==='all'?ERAS:ERAS.filter(e=>e.id===era);
  let side=0;

  eras.forEach(eraData=>{
    // Era header chip
    const hdr=document.createElement('div');
    hdr.className='tl-era-header';
    const chip=document.createElement('div');
    chip.className='tl-era-chip';
    chip.style.cssText=`color:${eraData.color};border-color:${eraData.color}55;`;
    chip.textContent=eraData.label;
    hdr.appendChild(chip);
    container.appendChild(hdr);

    // Events alternating left / right
    eraData.events.forEach(ev=>{
      const color=resolveColor(ev.color);
      const isLeft=(side%2===0);
      side++;

      const row=document.createElement('div');
      row.className='tl-event-row '+(isLeft?'left':'right');

      const hline=document.createElement('div');
      hline.className='tl-event-hline';
      hline.style.background=color;

      const dot=document.createElement('div');
      dot.className='tl-event-dot';
      dot.style.background=color;

      const card=document.createElement('div');
      card.className='tl-event-card';
      card.style.background=color+'0d';

      const bar=document.createElement('div');
      bar.className='tl-event-card-bar';
      bar.style.background=color;

      const TYPE_LABELS={war:'War',reform:'Reform',event:'Event',law:'Law'};

      const rulerHtml=(ev.ruler||ev.pm)?`
        <div class="tl-ruler-row">
          ${ev.ruler?`<span class="tl-ruler-note" style="color:${ev.ruler.color}">♛ ${ev.ruler.name}</span>`:''}
          ${ev.ruler&&ev.pm?`<span class="tl-ruler-divider"></span>`:''}
          ${ev.pm?`<span class="tl-ruler-note" style="color:rgba(200,185,155,0.75)">🏛 ${ev.pm}</span>`:''}
        </div>`
        :'';

      card.innerHTML=`
        <div style="margin-bottom:3px">
          <span class="tl-event-year" style="color:${color}">${ev.year}</span>
          <span class="tl-event-type" style="color:${color}">${TYPE_LABELS[ev.type]||ev.type}</span>
        </div>
        <div class="tl-event-title">${ev.title}</div>
        ${ev.sub?`<div class="tl-event-sub">${ev.sub}</div>`:''}
        <div class="tl-event-body">${ev.body||''}
          ${ev.tags?`<div class="tl-event-tags">${ev.tags.map(t=>`<span class="tl-tag">${t}</span>`).join('')}</div>`:''}
        </div>
        ${rulerHtml}`;
      card.prepend(bar);
      card.addEventListener('click',()=>card.classList.toggle('open'));

      row.appendChild(hline);
      row.appendChild(dot);
      row.appendChild(card);
      container.appendChild(row);
    });
  });
}

/* ══ 1. COURT HIERARCHY ══ */
function buildCourts(){
  const wrap=lawSection('Court Hierarchy','England & Wales  ·  Scotland — click any court to expand');

  const intro=document.createElement('div');
  intro.style.cssText='font-size:0.8rem;opacity:0.6;margin-bottom:24px;line-height:1.7';
  intro.textContent='The UK has two distinct legal systems: England & Wales share one hierarchy; Scotland has its own separate system rooted in Scots law (a unique mix of common and civil law traditions). Both ultimately share the UK Supreme Court for civil/devolved matters — but Scottish criminal appeals stop at the High Court of Justiciary.';
  wrap.appendChild(intro);

  // ── Shared Supreme Court banner ──
  const supreme=document.createElement('div');
  supreme.style.cssText='background:#c9a84c18;border:1px solid #c9a84c55;border-radius:10px;padding:11px 18px;margin-bottom:4px;cursor:pointer;transition:background 0.2s';
  supreme.innerHTML=`
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:1.1rem">🏛️</span>
      <div style="flex:1">
        <div style="font-weight:600;color:#c9a84c;font-size:0.92rem">UK Supreme Court</div>
        <div style="font-size:0.72rem;opacity:0.6;margin-top:2px">Highest court for civil & devolved matters across the whole UK</div>
      </div>
      <span style="font-size:0.55rem;letter-spacing:1px;text-transform:uppercase;opacity:0.4">HIGHEST</span>
    </div>
    <div class="law-expand-body" style="display:none;margin-top:8px;padding-top:8px;border-top:1px solid #c9a84c30;font-size:0.76rem;opacity:0.75;line-height:1.6">
      12 Justices · Established 2009 · Replaced the Appellate Committee of the House of Lords ·
      <b>Scottish criminal appeals do NOT come here</b> — they end at the High Court of Justiciary.
      Hears civil appeals from Court of Session (Scotland) and Court of Appeal (E&amp;W).
    </div>`;
  supreme.addEventListener('click',()=>{
    const b=supreme.querySelector('.law-expand-body');
    const open=b.style.display==='block';
    b.style.display=open?'none':'block';
    supreme.style.background=open?'#c9a84c18':'#c9a84c28';
  });
  wrap.appendChild(supreme);

  // Diverge arrows
  const divArrow=document.createElement('div');
  divArrow.style.cssText='display:flex;justify-content:center;gap:0;margin:2px 0 4px';
  divArrow.innerHTML=`
    <div style="width:50%;display:flex;flex-direction:column;align-items:center">
      <div style="width:2px;height:14px;background:rgba(255,255,255,0.15)"></div>
      <div style="color:rgba(255,255,255,0.2);font-size:0.85rem">▼</div>
    </div>
    <div style="width:50%;display:flex;flex-direction:column;align-items:center">
      <div style="width:2px;height:14px;background:rgba(255,255,255,0.15)"></div>
      <div style="color:rgba(255,255,255,0.2);font-size:0.85rem">▼</div>
    </div>`;
  wrap.appendChild(divArrow);

  // ── Side-by-side pyramids ──
  const cols=document.createElement('div');
  cols.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px';

  function makePyramid(heading, headColor, headFlag, levels){
    const col=document.createElement('div');

    // Column heading
    const colHead=document.createElement('div');
    colHead.style.cssText=`text-align:center;font-size:0.7rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:${headColor};opacity:0.85;margin-bottom:10px`;
    colHead.textContent=`${headFlag} ${heading}`;
    col.appendChild(colHead);

    const pyr=document.createElement('div');
    pyr.style.cssText='display:flex;flex-direction:column;align-items:stretch;gap:3px';

    levels.forEach((lv,i)=>{
      const row=document.createElement('div');
      // Taper effect via margin — widest at bottom
      const indent=`${i*3}%`;
      row.style.cssText=`margin-left:${indent};margin-right:${indent};background:${lv.color}18;border:1px solid ${lv.color}55;border-radius:9px;padding:9px 13px;cursor:pointer;transition:background 0.2s`;

        const b=row.querySelector('.law-expand-body');
        const open=b.style.display==='block';
        b.style.display=open?'none':'block';
        row.style.background=open?`${lv.color}18`:`${lv.color}28`;
      });
      pyr.appendChild(row);

      if(i<levels.length-1){
        const arr=document.createElement('div');
        arr.style.cssText='text-align:center;color:rgba(255,255,255,0.18);font-size:0.8rem;line-height:1.1';
        arr.textContent='▼';
        pyr.appendChild(arr);
      }
    });
    col.appendChild(pyr);
    return col;
  }

  const ewLevels=[
    {label:'Court of Appeal',sub:'Civil & Criminal Divisions',color:'#a78bfa',icon:'⚖️',
     note:'Hears appeals from High Court (civil) and Crown Court (criminal). Headed by the Master of the Rolls (Civil) and Lord Chief Justice (Criminal).'},
    {label:'High Court',sub:'Complex civil cases & judicial review',color:'#4a9edd',icon:'📜',
     note:"3 Divisions: King's Bench (contract/tort/judicial review) · Chancery (property/trusts/IP) · Family (divorce/children). Sits mainly in London (Royal Courts of Justice) and regional centres."},
    {label:'Crown Court',sub:'Serious criminal cases — jury trial',color:'#e05c5c',icon:'👥',
     note:'Handles indictable offences (murder, rape, robbery). Jury of 12. Judge decides sentence; jury decides verdict. ~90 Crown Court centres across England & Wales.'},

     note:'Handles most civil claims: debt, personal injury, housing, small claims (under £10,000). No jury in most cases. Judges sit across ~160 hearing centres.'},

  const scotLevels=[
    {label:'High Court of Justiciary',sub:'Highest criminal court — no further appeal',color:'#e05c5c',icon:'🔴',

    {label:'Court of Session',sub:'Highest civil court — appeals to UK Supreme Court',color:'#4a9edd',icon:'📜',
     note:'Scotland\'s supreme civil court, sitting in Edinburgh. Two divisions: Outer House (first instance) and Inner House (appeals). Civil appeals can go to the UK Supreme Court.'},
    {label:'Sheriff Appeal Court',sub:'Appeals from Sheriff Court',color:'#a78bfa',icon:'⚖️',
     note:'Established 2015. Hears criminal and civil appeals from Sheriff Courts, reducing the burden on higher courts. Does not require leave to appeal in most cases.'},
    {label:'Sheriff Court',sub:'Most civil & criminal cases',color:'#4cbe8a',icon:'🏠',
     note:"Scotland's main trial court — handles ~90% of all cases. 49 Sheriff Courts across Scotland. Sheriffs are legally qualified judges. Criminal: summary & solemn procedure. Civil: includes small claims (under £5,000) and simple procedure."},
    {label:'Justice of the Peace Court',sub:'Minor criminal matters',color:'#c9a84c',icon:'👤',
     note:'Lay justices handle minor summary offences (e.g. road traffic, minor assaults). Maximum 60 days\' imprisonment or £2,500 fine. Legally qualified clerk advises on law.'},
  ];

  cols.appendChild(makePyramid('England & Wales','#a78bfa','🏴󠁧󠁢󠁥󠁮󠁧󠁿',ewLevels));
  cols.appendChild(makePyramid('Scotland','#5dade2','🏴󠁧󠁢󠁳󠁣󠁴󠁿',scotLevels));
  wrap.appendChild(cols);

  // Key differences callout
  const diffs=document.createElement('div');
  diffs.style.cssText='display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;margin-bottom:4px';
  [
    {icon:'⚖️',color:'#c9a84c',title:'Scots Law — unique system',body:'A hybrid of Roman-Dutch civil law and English common law. Has its own terminology, procedure and court structure dating back centuries before the Acts of Union.'},
    {icon:'👥',color:'#e05c5c',title:'Jury of 15, not 12',body:'Scottish criminal juries have 15 members. There are also three possible verdicts: Guilty · Not Guilty · Not Proven (the "Scottish verdict" — acquittal but without full exoneration).'},
    {icon:'🔒',color:'#4a9edd',title:'Criminal appeals stay in Scotland',body:"Scotland's High Court of Justiciary is the final court for criminal matters. Unlike civil cases, Scottish criminal appeals cannot go to the UK Supreme Court in London."},
    {icon:'📋',color:'#4cbe8a',title:'Sheriff = Scottish judge',body:'The Sheriff is the workhorse of the Scottish courts — roughly equivalent to a Circuit Judge in England. The Principal Sheriff and Sheriff Principal oversee local sheriffdoms.'},
  ].forEach(({icon,color,title,body})=>{
    const box=document.createElement('div');
    box.style.cssText=`background:${color}0e;border:1px solid ${color}35;border-radius:10px;padding:12px 14px`;

      <div style="font-size:0.71rem;opacity:0.62;line-height:1.55">${body}</div>`;

/* ══ 2. CRIMINAL vs CIVIL ══ */
function buildCriminalCivil(){
  const wrap=lawSection('Criminal Law vs Civil Law','Two distinct branches of the legal system');

  const rows=[
    ['','🔴 Criminal Law','🔵 Civil Law'],
    ['Purpose','Punish offences against society / the state','Resolve disputes between individuals or organisations'],
    ['Who brings the case','The Crown (state) — e.g. "R v Smith"','The claimant (victim) — e.g. "Jones v Brown"'],
    ['Standard of proof','Beyond reasonable doubt','Balance of probabilities'],
    ['Outcome if found guilty','Prison, fine, community service, caution','Compensation, injunction, damages'],
    ['Examples','Murder, theft, assault, drug offences','Contract disputes, personal injury, divorce, housing'],
    ['Courts used','Magistrates\' Court, Crown Court','County Court, High Court'],
    ['Jury?','Yes — Crown Court (12 jurors)','Rarely — usually judge alone'],
  ];

  const table=document.createElement('div');
  table.style.cssText='overflow-x:auto;margin-bottom:20px';

  const t=document.createElement('table');
  t.style.cssText='width:100%;border-collapse:collapse;font-size:0.78rem';

  rows.forEach((row,ri)=>{
    const tr=document.createElement('tr');
    row.forEach((cell,ci)=>{
      const td=document.createElement(ri===0?'th':'td');
      td.textContent=cell;
      const isHeader=(ri===0);
      const isCrim=(ci===1&&ri>0);
      const isCivil=(ci===2&&ri>0);
      const isLabel=(ci===0&&ri>0);
      td.style.cssText=`
        padding:10px 14px;
        text-align:${ci===0?'left':'left'};
        border-bottom:1px solid rgba(255,255,255,0.07);
        background:${isHeader&&ci===1?'rgba(224,92,92,0.18)':isHeader&&ci===2?'rgba(74,158,221,0.18)':isHeader&&ci===0?'transparent':isCrim?'rgba(224,92,92,0.06)':isCivil?'rgba(74,158,221,0.06)':'transparent'};
        color:${isHeader&&ci===1?'#e05c5c':isHeader&&ci===2?'#4a9edd':isHeader?'rgba(250,246,238,0.5)':isLabel?'rgba(250,246,238,0.5)':'var(--cream)'};
        font-weight:${isHeader||isLabel?'600':'400'};
        font-size:${isHeader?'0.8rem':'0.76rem'};
      `;
      tr.appendChild(td);
    });
    t.appendChild(tr);
  });
  table.appendChild(t);
  wrap.appendChild(table);

  // Key points row
  const pts=document.createElement('div');
  pts.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px';
  [
    {c:'#e05c5c',title:'Criminal — key points',points:['Prosecuted by Crown Prosecution Service (CPS)','Defendant innocent until proven guilty','Must be 10+ years old to be criminally responsible','Jury reaches verdict; judge passes sentence']},
    {c:'#4a9edd',title:'Civil — key points',points:['Anyone can bring a claim','Small Claims Court for amounts under £10,000','Legal aid available for some civil cases','Parties can settle out of court at any time']},
  ].forEach(({c,title,points})=>{
    const box=lawCard(`${c}10`,`${c}40`,`
      <div style="color:${c};font-weight:600;font-size:0.82rem;margin-bottom:8px">${title}</div>
      ${points.map(p=>`<div style="font-size:0.74rem;opacity:0.75;line-height:1.7;padding-left:12px;position:relative">• ${p}</div>`).join('')}`);
    pts.appendChild(box);
  });
  wrap.appendChild(pts);
  return wrap;
}

/* ══ 3. HOW A LAW IS MADE ══ */
function buildLawMaking(){
  const wrap=lawSection('How a Law is Made','The UK Parliamentary legislative process');

  const steps=[
    {n:'1',icon:'💡',title:'Green / White Paper',desc:'Government publishes proposals. Green Paper = consultation; White Paper = firm proposals.',color:'#c9a84c'},
    {n:'2',icon:'📄',title:'First Reading',desc:'Bill introduced to Parliament — title read out. No debate. Can start in Commons or Lords.',color:'#a78bfa'},
    {n:'3',icon:'💬',title:'Second Reading',desc:'Main debate on the Bill\'s principles. MPs or Lords vote on whether to proceed.',color:'#4a9edd'},
    {n:'4',icon:'🔍',title:'Committee Stage',desc:'Line-by-line scrutiny. Amendments can be made. Usually done by a small committee.',color:'#4cbe8a'},
    {n:'5',icon:'📝',title:'Report Stage',desc:'Further amendments proposed and debated on the floor of the House.',color:'#4cbe8a'},
    {n:'6',icon:'✅',title:'Third Reading',desc:'Final vote on the Bill in its amended form. Limited further changes possible.',color:'#4a9edd'},
    {n:'7',icon:'🔄',title:'Other House',desc:'Bill passes to Lords (or Commons if started in Lords). Same stages repeat. Any changes sent back ("ping-pong").',color:'#a78bfa'},
    {n:'8',icon:'👑',title:'Royal Assent',desc:'Monarch formally approves the Bill — it becomes an Act of Parliament and the law of the land.',color:'#c9a84c'},
  ];

  const flow=document.createElement('div');
  flow.style.cssText='position:relative;padding-left:32px';

  // Vertical line
  const vline=document.createElement('div');
  vline.style.cssText='position:absolute;left:12px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--gold),#4cbe8a,var(--gold));opacity:0.3;border-radius:2px';
  flow.appendChild(vline);

  steps.forEach((s,i)=>{
    const row=document.createElement('div');
    row.style.cssText='display:flex;gap:14px;margin-bottom:10px;align-items:flex-start;cursor:pointer';

    const dot=document.createElement('div');
    dot.style.cssText=`width:24px;height:24px;border-radius:50%;background:${s.color}33;border:2px solid ${s.color}88;display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:700;color:${s.color};flex-shrink:0;margin-top:2px;position:relative;z-index:1`;
    dot.textContent=s.n;

    const card=document.createElement('div');
    card.style.cssText=`flex:1;background:${s.color}0d;border:1px solid ${s.color}30;border-radius:10px;padding:10px 14px;transition:background 0.18s`;
    card.innerHTML=`
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">
        <span style="font-size:1rem">${s.icon}</span>
        <span style="font-weight:600;color:${s.color};font-size:0.87rem">${s.title}</span>
      </div>
      <div style="font-size:0.73rem;opacity:0.68;line-height:1.6">${s.desc}</div>`;
    card.addEventListener('mouseenter',()=>card.style.background=`${s.color}18`);
    card.addEventListener('mouseleave',()=>card.style.background=`${s.color}0d`);

    row.appendChild(dot);
    row.appendChild(card);
    flow.appendChild(row);
  });
  wrap.appendChild(flow);

  // Note
  const note=document.createElement('div');
  note.style.cssText='font-size:0.7rem;opacity:0.45;margin-top:14px;line-height:1.6;padding-left:32px';
  note.textContent='Note: The Parliament Acts 1911 & 1949 mean the House of Lords can delay but cannot permanently block most legislation passed by the Commons.';
  wrap.appendChild(note);
  return wrap;
}

/* ══ 4. RIGHTS & RESPONSIBILITIES ══ */
function buildRights(){
  const wrap=lawSection('Rights & Responsibilities','What the law guarantees — and what it requires of you');

  const grid=document.createElement('div');
  grid.style.cssText='display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:24px';

  const sections=[
    {
      color:'#4a9edd',icon:'📜',title:'Human Rights Act 1998',
      sub:'Incorporates the European Convention on Human Rights into UK law',
      rights:[
        'Right to life (Article 2)',
        'Freedom from torture (Article 3)',
        'Right to a fair trial (Article 6)',
        'Right to respect for private & family life (Article 8)',
        'Freedom of thought, conscience & religion (Article 9)',
        'Freedom of expression (Article 10)',
        'Freedom of assembly & association (Article 11)',
        'Right to marry (Article 12)',
        'Prohibition of discrimination (Article 14)',
      ]
    },
    {
      color:'#4cbe8a',icon:'🗳️',title:'Equality Act 2010',
      sub:'Protects people from discrimination based on "protected characteristics"',
      rights:[
        'Age','Disability','Gender reassignment',
        'Marriage & civil partnership','Pregnancy & maternity',
        'Race','Religion or belief','Sex','Sexual orientation',
      ]
    },
    {
      color:'#e05c5c',icon:'⚠️',title:'Your Responsibilities',
      sub:'Legal obligations of everyone living in the UK',
      rights:[
        'Obey the law at all times',
        'Pay taxes as required',
        'Treat others fairly regardless of background',
        'Respect others\' rights and freedoms',
        'Register to vote (if eligible)',
        'Serve on a jury if called',
        'Respect public property',
        'Report crimes and cooperate with police',
      ]
    },
    {
      color:'#a78bfa',icon:'🏛️',title:'Constitutional Principles',
      sub:'Fundamental pillars of the UK\'s unwritten constitution',
      rights:[
        'Parliamentary sovereignty — Parliament is supreme',
        'Rule of law — no one is above the law',
        'Separation of powers (legislature, executive, judiciary)',
        'Constitutional monarchy — Crown acts on ministers\' advice',
        'Judicial independence — courts free from political pressure',
        'Individual rights protected by common law & statute',
      ]
    },
  ];

  sections.forEach(s=>{
    const box=document.createElement('div');
    box.style.cssText=`background:${s.color}0e;border:1px solid ${s.color}40;border-radius:12px;padding:16px 18px;`;
    box.innerHTML=`
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span style="font-size:1.2rem">${s.icon}</span>
        <div>
          <div style="color:${s.color};font-weight:700;font-size:0.88rem">${s.title}</div>
          <div style="font-size:0.67rem;opacity:0.5;margin-top:1px">${s.sub}</div>
        </div>
      </div>
      <div style="height:1px;background:${s.color}25;margin:10px 0"></div>
      ${s.rights.map(r=>`<div style="font-size:0.74rem;opacity:0.75;line-height:1.8;padding-left:10px;position:relative">
        <span style="position:absolute;left:0;color:${s.color};opacity:0.6">›</span> ${r}
      </div>`).join('')}`;
    grid.appendChild(box);
  });
  wrap.appendChild(grid);

  // Magna Carta lineage note
  const heritage=lawCard('rgba(201,168,76,0.07)','rgba(201,168,76,0.3)',`
    <div style="color:var(--gold);font-weight:600;font-size:0.82rem;margin-bottom:8px">📜 The Heritage of Rights</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;font-size:0.73rem">
      ${[
        {y:'1215',t:'Magna Carta','d':'No free man may be imprisoned without lawful judgement'},
        {y:'1628',t:'Petition of Right','d':'Parliament must consent to taxes; no arbitrary imprisonment'},
        {y:'1689',t:'Bill of Rights','d':'Parliamentary sovereignty; freedom of speech in Parliament'},
        {y:'1998',t:'Human Rights Act','d':'ECHR rights enforceable in UK courts'},
        {y:'2010',t:'Equality Act','d':'Consolidated and extended anti-discrimination law'},
      ].map(x=>`<div style="background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.2);border-radius:8px;padding:8px 10px;min-width:140px;flex:1">
        <div style="color:var(--gold);font-weight:600;font-size:0.7rem">${x.y} — ${x.t}</div>
        <div style="opacity:0.55;margin-top:3px;line-height:1.5">${x.d}</div>
      </div>`).join('')}
    </div>`);
  wrap.appendChild(heritage);
  return wrap;
}

/* ══ 5. DEVOLVED POWERS ══ */
function buildDevolved(){
  const wrap=lawSection('Devolved vs Reserved Powers','What the UK Parliament controls vs devolved legislatures');

  const intro=document.createElement('div');
  intro.style.cssText='font-size:0.78rem;opacity:0.6;line-height:1.7;margin-bottom:20px';
  intro.textContent='The UK Parliament at Westminster retains authority over "reserved matters". Devolved legislatures in Scotland, Wales and Northern Ireland control "devolved matters" in their area. England has no separate parliament — Westminster acts as its legislature.';
  wrap.appendChild(intro);

  // Main grid
  const grid=document.createElement('div');
  grid.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px';

  [
    {color:'#c0392b',icon:'🏛️',title:'Reserved — UK Parliament (Westminster)',
     items:['Defence & armed forces','Foreign policy & diplomacy','Immigration & nationality','Social security & benefits (most)','Broadcasting (BBC, Ofcom)','Nuclear energy & electricity regulation','Income tax rates (partly)','Constitution & electoral law']},
    {color:'#27ae60',icon:'🏴󠁧󠁢󠁳󠁣󠁴󠁿',title:'Devolved — Scotland, Wales, N. Ireland',
     items:['Education & schools','Health & NHS (locally)','Housing','Local government','Environment & planning','Tourism & economic development','Agriculture (Scotland/Wales)','Justice & policing (Scotland & N. Ireland)']},
  ].forEach(({color,icon,title,items})=>{
    const box=document.createElement('div');
    box.style.cssText=`background:${color}0f;border:1px solid ${color}40;border-radius:12px;padding:14px 16px`;
    box.innerHTML=`
      <div style="color:${color};font-weight:700;font-size:0.85rem;margin-bottom:10px">${icon} ${title}</div>
      ${items.map(it=>`<div style="font-size:0.74rem;opacity:0.72;line-height:1.75;padding-left:12px;position:relative"><span style="position:absolute;left:0;color:${color}">•</span>${it}</div>`).join('')}`;
    grid.appendChild(box);
  });
  wrap.appendChild(grid);

  // The four nations
  const nations=document.createElement('div');
  nations.style.cssText='display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px';
  [
    {flag:'🏴󠁧󠁢󠁥󠁮󠁧󠁿',name:'England',color:'#c0392b',body:'No devolved parliament. Laws made by Westminster. Population: ~56m. Capital: London.'},
    {flag:'🏴󠁧󠁢󠁳󠁣󠁴󠁿',name:'Scotland',color:'#1a5276',body:'Scottish Parliament (Holyrood, 1999). MSPs elected by proportional representation. Has own legal system and education system.'},
    {flag:'🏴󠁧󠁢󠁷󠁬󠁳󠁿',name:'Wales',color:'#27ae60',body:'Senedd Cymru / Welsh Parliament (1999). Welsh and English both official languages. Has own NHS Wales.'},
    {flag:'🇮🇪',name:'Northern Ireland',color:'#c9a84c',body:'Northern Ireland Assembly (Stormont, 1998). Power-sharing executive. Part of UK; shares land border with Republic of Ireland.'},
  ].forEach(({flag,name,color,body})=>{
    const box=document.createElement('div');
    box.style.cssText=`background:${color}0f;border:1px solid ${color}38;border-radius:10px;padding:13px 15px`;
    box.innerHTML=`
      <div style="font-size:1.4rem;margin-bottom:6px">${flag}</div>
      <div style="color:${color};font-weight:700;font-size:0.88rem;margin-bottom:6px">${name}</div>
      <div style="font-size:0.72rem;opacity:0.65;line-height:1.6">${body}</div>`;
    nations.appendChild(box);
  });
  wrap.appendChild(nations);
  return wrap;
}

/* ══ 6. KEY FACTS ══ */
function buildKeyFacts(){
  const wrap=lawSection('Key Legal Facts','Essential facts for the Life in the UK test');

  const facts=[
    {icon:'👶',color:'#e05c5c',label:'Age of Criminal Responsibility',value:'10 years old',note:'In England, Wales & Northern Ireland. Scotland: 12 years.'},
    {icon:'👥',color:'#4a9edd',label:'Jury Size',value:'12 jurors',note:'Crown Court criminal trials. Jurors must be aged 18–75, on electoral register, resident in UK for 5+ years.'},
    {icon:'🗳️',color:'#4cbe8a',label:'Voting Age',value:'18 years old',note:'For UK Parliament & English local elections. Scotland & Wales allow 16+ for Holyrood / Senedd elections.'},
    {icon:'🤝',color:'#a78bfa',label:'Age of Consent',value:'16 years old',note:'Applies across the UK regardless of gender or sexual orientation.'},
    {icon:'🚗',color:'#c9a84c',label:'Driving Age',value:'17 years old',note:'For a car. 16 for a moped (up to 50cc). Must pass theory and practical tests.'},
    {icon:'🍺',color:'#f97316',label:'Drinking Age',value:'18 years old',note:'To buy alcohol. 16/17 year olds may drink beer/wine/cider with a meal if with an adult (restaurant setting).'},
    {icon:'📋',color:'#4a9edd',label:'Tax — Personal Allowance',value:'£12,570 (2024/25)',note:'Income below this amount is not taxed. Administered by HMRC.'},
    {icon:'⚖️',color:'#e05c5c',label:'Small Claims Court limit',value:'£10,000',note:'County Court small claims track. For disputes under this value — no solicitor needed.'},
    {icon:'🏠',color:'#4cbe8a',label:'Legal Age to Buy / Rent',value:'18 years old',note:'To sign a tenancy or purchase agreement. Under 18s cannot hold a legal estate in land.'},
    {icon:'📜',color:'#a78bfa',label:'Common Law Heritage',value:'Since 1066',note:'England\'s judge-made common law tradition predates Parliament. Precedent (stare decisis) means higher court decisions bind lower courts.'},
    {icon:'👮',color:'#c9a84c',label:'Police Detention (without charge)',value:'Up to 24 hours',note:'Standard. Extended to 36–96 hrs for serious offences with magistrate approval. Terror offences: up to 14 days.'},
    {icon:'🏛️',color:'#f97316',label:'Supreme Court established',value:'2009',note:'Replaced the Appellate Committee of the House of Lords. 12 Justices appointed by independent commission.'},

  const grid=document.createElement('div');

  facts.forEach(f=>{
    const box=document.createElement('div');
    box.style.cssText=`background:${f.color}0e;border:1px solid ${f.color}40;border-radius:12px;padding:14px 16px;display:flex;gap:12px;align-items:flex-start`;
    box.innerHTML=`
      <span style="font-size:1.4rem;flex-shrink:0">${f.icon}</span>
      <div>
        <div style="font-size:0.68rem;text-transform:uppercase;letter-spacing:1px;color:${f.color};opacity:0.7;margin-bottom:2px">${f.label}</div>
        <div style="font-size:1.05rem;font-weight:700;color:${f.color};margin-bottom:4px">${f.value}</div>
        <div style="font-size:0.71rem;opacity:0.55;line-height:1.5">${f.note}</div>
      </div>`;
    grid.appendChild(box);
  });
  wrap.appendChild(grid);

  // CPS / Police structure note
  const agencies=lawCard('rgba(255,255,255,0.03)','rgba(255,255,255,0.08)',`
    <div style="font-weight:600;color:var(--gold);font-size:0.82rem;margin-bottom:10px">Key Legal Agencies</div>
    <div style="display:flex;flex-wrap:wrap;gap:10px;font-size:0.73rem">
      ${[
        {name:'Crown Prosecution Service (CPS)',role:'Decides whether to prosecute criminal cases in England & Wales'},
        {name:'HMCTS',role:'Her Majesty\'s Courts & Tribunals Service — administers courts'},
        {name:'Legal Aid Agency',role:'Funds legal representation for those who cannot afford it'},
        {name:'Judicial Appointments Commission',role:'Selects judges independently of government'},
        {name:'Law Commission',role:'Recommends law reform to Parliament'},
        {name:'Solicitors / Barristers',role:'Solicitors advise clients; barristers argue cases in court'},
      ].map(a=>`<div style="background:rgba(255,255,255,0.04);border-radius:8px;padding:8px 10px;flex:1;min-width:200px">
        <div style="color:rgba(250,246,238,0.85);font-weight:600;margin-bottom:3px">${a.name}</div>
        <div style="opacity:0.5;line-height:1.5">${a.role}</div>
      </div>`).join('')}
    </div>`);
  wrap.appendChild(agencies);
  return wrap;
}
